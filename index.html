<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEEBOY.COM | Online Shop Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f6f8;
      color: #1b1b1b;
      font-family: Arial, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      background: #101820;
      color: white;
    }

    header h1 {
      margin: 0;
    }

    .hero {
      padding: 60px 40px;
      background: #ffd166;
      text-align: center;
    }

    .hero h2 {
      margin: 0 0 10px;
      font-size: 42px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      padding: 18px;
      border-radius: 8px;
      background: white;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #101820;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #e63946;
    }

    .cart {
      margin: 0 40px 40px;
      padding: 20px;
      border-radius: 8px;
      background: white;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
    }

    .total {
      margin-top: 15px;
      font-size: 22px;
      font-weight: bold;
      text-align: right;
    }

    footer {
      padding: 20px;
      background: #101820;
      color: white;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>DEEBOY.COM</h1>
    <p>Cart: <span id="cartCount">0</span></p>
  </header>

  <section class="hero">
    <h2>Welcome to DEEBOY.COM</h2>
    <p>Shop fashion, shoes, and accessories.</p>
  </section>

  <section class="products">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1523398002811-999ca8dec234?auto=format&fit=crop&w=600&q=80" alt="Classic T-Shirt">
      <h3>Classic T-Shirt</h3>
      <p>$25</p>
      <button onclick="addToCart('Classic T-Shirt', 25)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=600&q=80" alt="Sport Sneakers">
      <h3>Sport Sneakers</h3>
      <p>$60</p>
      <button onclick="addToCart('Sport Sneakers', 60)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=600&q=80" alt="Smart Watch">
      <h3>Smart Watch</h3>
      <p>$45</p>
      <button onclick="addToCart('Smart Watch', 45)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=600&q=80" alt="Urban Backpack">
      <h3>Urban Backpack</h3>
      <p>$35</p>
      <button onclick="addToCart('Urban Backpack', 35)">Add to Cart</button>
    </div>
  </section>

  <section class="cart">
    <h2>Your Cart</h2>
    <div id="cartItems">
      <p>No items yet.</p>
    </div>
    <div class="total">Total: $<span id="total">0</span></div>
  </section>

  <footer>
    <p>&copy; 2026 DEEBOY.COM. Demo website.</p>
  </footer>

  <script>
    let cart = [];
    let total = 0;

    function addToCart(name, price) {
      cart.push({ name: name, price: price });
      total = total + price;
      showCart();
    }

    function showCart() {
      let cartItems = document.getElementById("cartItems");
      let cartCount = document.getElementById("cartCount");
      let totalText = document.getElementById("total");

      cartItems.innerHTML = "";

      cart.forEach(function(item) {
        cartItems.innerHTML += `
          <div class="cart-item">
            <span>${item.name}</span>
            <strong>$${item.price}</strong>
          </div>
        `;
      });

      cartCount.textContent = cart.length;
      totalText.textContent = total;
    }
  </script>
</body>
</html>
